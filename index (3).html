<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP - RV Blocos</title>
    
    <link rel="icon" href="https://i.postimg.cc/bNzydNr0/Captura-de-tela-2026-02-03-081527-(2).png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://i.postimg.cc/bNzydNr0/Captura-de-tela-2026-02-03-081527-(2).png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ERP RV Blocos">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #f4f4f4; /* Cor de fundo para evitar flash branco caso algo atrase */
        }

        /* Estilos da Tela de Carregamento */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff; /* Fundo da tela de carregamento (pode mudar a cor se quiser) */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* Garante que fique por cima de tudo */
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #splash-screen img {
            width: 400px; /* Tamanho da sua logo */
            animation: pulse 1.5s infinite; /* Efeito de pulsar */
        }

        /* Animação de pulsar a logo */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }
    </style>
</head>

<body>

    <div id="splash-screen">
        <img src="https://i.postimg.cc/pTxyPQFL/Captura-de-tela-2026-02-03-081527.png" alt="Carregando ERP RV Blocos...">
    </div>

    <iframe 
        src="https://script.google.com/macros/s/AKfycbxlu0gpmTcZYdt7igyoBTFHQeRip3_zay5C5iiPKwFePzWUSyLa4tpqGMqBVC0WCHwz8Q/exec" 
        onload="esconderSplashScreen()">
    </iframe>

    <script>
        // Função para esconder a tela de carregamento quando o iframe estiver pronto
        function esconderSplashScreen() {
            const splash = document.getElementById('splash-screen');
            // Remove a opacidade para criar o efeito de "fade out"
            splash.style.opacity = '0';
            splash.style.visibility = 'hidden';
            
            // Remove o elemento do HTML depois que a animação terminar para não atrapalhar o clique
            setTimeout(() => {
                splash.style.display = 'none';
            }, 500); // 500ms é o tempo do nosso transition no CSS
        }
    </script>

</body>
</html>
